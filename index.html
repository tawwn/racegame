<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Your Car — APEX RACING</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── LAYOUT ── */
.content { background:var(--bg); }
.left-panel {
  width:58%; padding:40px 48px; display:flex; flex-direction:column;
  background: linear-gradient(135deg, var(--s1) 0%, var(--bg) 100%);
  border-right:1px solid var(--border);
  overflow-y:auto;
}
.section-label {
  font-family:'Barlow Condensed',sans-serif; font-size:11px;
  font-weight:700; letter-spacing:3px; color:var(--muted);
  margin-bottom:6px;
}
.section-title {
  font-family:'Barlow Condensed',sans-serif; font-size:40px;
  font-weight:900; letter-spacing:3px; margin-bottom:32px; line-height:1;
}

/* ── CAR GRID ── */
.car-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:12px; flex:1;
}
.car-card {
  background:var(--s2); border:1px solid var(--border);
  border-radius:12px; padding:16px 12px 14px;
  cursor:pointer; transition:all .2s ease;
  display:flex; flex-direction:column; align-items:center;
  position:relative; overflow:hidden;
}
.car-card::before {
  content:''; position:absolute; inset:0; border-radius:12px;
  background:linear-gradient(135deg, transparent 60%, rgba(0,212,255,.04));
  opacity:0; transition:opacity .2s;
}
.car-card:hover { border-color:var(--dim); background:var(--s3); transform:translateY(-2px); }
.car-card:hover::before { opacity:1; }
.car-card.selected {
  border-color:var(--accent); background:var(--s2);
  box-shadow:0 0 0 1px var(--accent), 0 8px 32px rgba(0,212,255,.15);
}
.car-card.selected::before { opacity:1; }

.car-img-wrap {
  width:100%; height:90px; display:flex;
  align-items:center; justify-content:center;
  position:relative; margin-bottom:10px;
}
.car-img {
  width:100%; height:90px; object-fit:contain;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.6));
  transition:transform .3s ease;
}
.car-card:hover .car-img { transform:scale(1.05); }
.car-card.selected .car-img { filter:drop-shadow(0 4px 20px rgba(0,212,255,.3)); }

.car-brand {
  font-family:'Barlow Condensed',sans-serif; font-size:13px;
  font-weight:700; letter-spacing:1px; color:var(--text);
  text-align:center;
}
.car-model {
  font-size:10px; color:var(--muted); text-align:center;
  margin-top:2px; font-weight:400;
}
.selected-badge {
  position:absolute; top:8px; right:8px;
  width:20px; height:20px; border-radius:50%;
  background:var(--accent); display:none;
  align-items:center; justify-content:center;
}
.selected-badge svg { width:10px; height:10px; }
.car-card.selected .selected-badge { display:flex; }

/* ── DETAIL PANEL ── */
.right-panel {
  width:42%; padding:40px 40px 32px;
  display:flex; flex-direction:column; gap:0;
  background:var(--s1);
  overflow-y:auto;
}

.detail-car-showcase {
  width:100%; height:200px; position:relative;
  border-radius:12px; overflow:hidden;
  background:linear-gradient(160deg, #0a0a0d, #111116);
  margin-bottom:24px; flex-shrink:0;
  border:1px solid var(--border);
}
.detail-car-img {
  width:100%; height:100%; object-fit:contain;
  padding:16px;
  filter:drop-shadow(0 8px 30px rgba(0,0,0,.8));
  transition:all .4s ease;
}
.detail-car-glow {
  position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:80%; height:30%; border-radius:50%;
  background:var(--accent); filter:blur(40px); opacity:0.06;
  transition:opacity .4s; pointer-events:none;
}

.detail-name {
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px; font-weight:700; letter-spacing:3px;
  color:var(--muted); margin-bottom:4px;
}
.detail-model {
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px; font-weight:900; letter-spacing:1px;
  margin-bottom:24px; line-height:1;
}

.stats-section { display:flex; flex-direction:column; gap:12px; margin-bottom:24px; }

.spec-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:28px;
}
.spec-item {
  background:var(--s2); border:1px solid var(--border);
  border-radius:8px; padding:12px 14px;
}
.spec-label {
  font-family:'Barlow Condensed',sans-serif; font-size:9px;
  font-weight:700; letter-spacing:2px; color:var(--muted); margin-bottom:4px;
}
.spec-value {
  font-family:'Barlow Condensed',sans-serif; font-size:18px;
  font-weight:700; color:var(--text);
}

.btn-select { width:100%; padding:16px; font-size:15px; margin-top:auto; }
</style>
</head>
<body>
<div class="page">

  <!-- TOPBAR -->
  <div class="topbar">
    <a class="logo" href="index.html"><em>APEX</em> RACING</a>
    <div class="steps">
      <div class="step-item active">01 — SELECT CAR</div>
      <div class="step-sep"></div>
      <div class="step-item">02 — CIRCUIT</div>
      <div class="step-sep"></div>
      <div class="step-item">03 — RACE</div>
      <div class="step-sep"></div>
      <div class="step-item">04 — RESULTS</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="content">

    <!-- LEFT: car grid -->
    <div class="left-panel">
      <div class="section-label">STEP 01</div>
      <div class="section-title">SELECT YOUR<br>VEHICLE</div>
      <div class="car-grid" id="car-grid"></div>
    </div>

    <!-- RIGHT: detail -->
    <div class="right-panel">
      <div class="detail-car-showcase">
        <img id="detail-img" class="detail-car-img" src="" alt="">
        <div class="detail-car-glow" id="detail-glow"></div>
      </div>

      <div class="detail-name" id="detail-brand">FERRARI</div>
      <div class="detail-model" id="detail-model">LaFerrari</div>

      <div class="stats-section">
        <div class="stat-row">
          <div class="stat-head"><span>TOP SPEED</span><span class="stat-val" id="s-speed">350 km/h</span></div>
          <div class="stat-track"><div class="stat-fill" id="sb-speed"></div></div>
        </div>
        <div class="stat-row">
          <div class="stat-head"><span>ACCELERATION</span><span class="stat-val" id="s-accel">2.9s</span></div>
          <div class="stat-track"><div class="stat-fill" id="sb-accel"></div></div>
        </div>
        <div class="stat-row">
          <div class="stat-head"><span>HANDLING</span><span class="stat-val" id="s-handle">90/100</span></div>
          <div class="stat-track"><div class="stat-fill" id="sb-handle"></div></div>
        </div>
        <div class="stat-row">
          <div class="stat-head"><span>BRAKING</span><span class="stat-val" id="s-brake">92/100</span></div>
          <div class="stat-track"><div class="stat-fill" id="sb-brake"></div></div>
        </div>
      </div>

      <div class="spec-grid">
        <div class="spec-item">
          <div class="spec-label">WEIGHT</div>
          <div class="spec-value" id="s-weight">1,255 kg</div>
        </div>
        <div class="spec-item">
          <div class="spec-label">POWER</div>
          <div class="spec-value" id="s-power">950 hp</div>
        </div>
        <div class="spec-item">
          <div class="spec-label">0-100 KM/H</div>
          <div class="spec-value" id="s-accel2">2.9 s</div>
        </div>
        <div class="spec-item">
          <div class="spec-label">TOP SPEED</div>
          <div class="spec-value" id="s-speed2">350 km/h</div>
        </div>
      </div>

      <button class="btn btn-primary btn-select" id="btn-select" onclick="selectCar()">
        SELECT VEHICLE →
      </button>
    </div>

  </div>
</div>

<script src="data.js"></script>
<script>
let activeCar = CARS[0];

function buildGrid() {
  const grid = document.getElementById('car-grid');
  grid.innerHTML = '';
  CARS.forEach((car, i) => {
    const card = document.createElement('div');
    card.className = 'car-card' + (i === 0 ? ' selected' : '');
    card.dataset.id = car.id;
    card.innerHTML = `
      <div class="car-img-wrap">
        <img class="car-img" src="${CAR_IMAGES[car.id]}" alt="${car.name}" loading="lazy">
      </div>
      <div class="car-brand">${car.name}</div>
      <div class="car-model">${car.model}</div>
      <div class="selected-badge">
        <svg viewBox="0 0 10 10" fill="none">
          <path d="M2 5l2.5 2.5L8 3" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    `;
    card.onclick = () => setActive(car, card);
    grid.appendChild(card);
  });
  updateDetail(CARS[0]);
}

function setActive(car, card) {
  document.querySelectorAll('.car-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  activeCar = car;
  updateDetail(car);
}

function updateDetail(car) {
  document.getElementById('detail-img').src = CAR_IMAGES[car.id];
  document.getElementById('detail-brand').textContent = car.name.toUpperCase();
  document.getElementById('detail-model').textContent = car.model;
  document.getElementById('detail-glow').style.background = car.color;

  document.getElementById('s-speed').textContent  = car.topSpeed + ' km/h';
  document.getElementById('s-accel').textContent  = car.accelSec + 's 0-100';
  document.getElementById('s-handle').textContent = car.handle + '/100';
  document.getElementById('s-brake').textContent  = car.brake  + '/100';
  document.getElementById('sb-speed').style.width  = car.speed  + '%';
  document.getElementById('sb-accel').style.width  = car.accel  + '%';
  document.getElementById('sb-handle').style.width = car.handle + '%';
  document.getElementById('sb-brake').style.width  = car.brake  + '%';

  document.getElementById('s-weight').textContent = car.weight;
  document.getElementById('s-power').textContent  = car.power;
  document.getElementById('s-accel2').textContent  = car.accelSec + ' s';
  document.getElementById('s-speed2').textContent  = car.topSpeed + ' km/h';
}

function selectCar() {
  State.set('car', activeCar);
  window.location.href = 'circuit.html';
}

buildGrid();
// Restore previously selected car if any
const saved = State.get('car');
if (saved) {
  const car = CARS.find(c => c.id === saved.id);
  if (car) {
    activeCar = car;
    updateDetail(car);
    // Highlight card
    setTimeout(() => {
      const card = document.querySelector(`[data-id="${car.id}"]`);
      if (card) {
        document.querySelectorAll('.car-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
      }
    }, 50);
  }
}
</script>
</body>
</html>
